#########################################################
#       ELK 9.1.1 installation playbook                 #
#       Maintainer: Majid Mortazavi                     #
#       Release note:                                   #
#           - V.1.00  Just install                      #
#       Douran Co. LTD                                  #
#########################################################

---
- name: Install ELK Stack 9.1.1 on Single Server (No Cluster, No SSL, Nexus Repo)
  hosts: ELKServers
  remote_user: root

  vars:
    elk_version: "9.1.1"
    nexus: "<YOUR NEXUS REPO>"
    apt_proxy: "/apt-proxy-noble/"
    apt_hosted: "/apt-hosted/"
    nexus_components: "main restricted universe multiverse"
    elasticsearch_network_host: "0.0.0.0"
    elasticsearch_http_port: 9200
    kibana_server_host: "0.0.0.0"
    kibana_server_port: 5601
    elastic_password: "<ELASTIC PASSWORD>"
    elasticsearch_data_path: "/var/lib/elasticsearch"
    elasticsearch_logs_path: "/var/log/elasticsearch"
    hostname: "<YOUR SERVER IP>"
    kibana_system_password: "<KIBANA_SYSTEM PASSWORD>"
    logstash_system_password: "<LOGSTASH_SYSTEM PASSWORD>"

  tasks:
    - name: Download Nexus APT public key from Nexus RAW repo
      ansible.builtin.get_url:
        url: "{{ nexus }}/raw-keys/root/gpg/apt/public.gpg.key"
        dest: "/usr/share/keyrings/nexus-apt.asc"
        mode: "0644"

    - name: Ensure gnupg is installed
      ansible.builtin.apt:
        name: gnupg
        state: present

    - name: Dearmor Nexus APT key
      ansible.builtin.command:
        cmd: "gpg --dearmor -o /usr/share/keyrings/nexus-apt.gpg /usr/share/keyrings/nexus-apt.asc"
          # args:
        creates: "/usr/share/keyrings/nexus-apt.gpg"
        removes: "/usr/share/keyrings/nexus-apt.asc"

    - name: Delete default sources in sources.list.d directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/ubuntu.sources
        - /etc/apt/sources.list.d/ubuntu.sources.curtin.orig

    - name: Create Nexus repository configuration for Ubuntu 24.04 (Noble)
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/nexus.list
        mode: "0644"
        content: |
          # Nexus Repository Configuration
          deb [trusted=yes] {{ nexus }}{{ apt_proxy }} noble {{ nexus_components }}
          deb [trusted=yes] {{ nexus }}{{ apt_proxy }} noble-updates {{ nexus_components }}
          deb [trusted=yes] {{ nexus }}{{ apt_proxy }} noble-security {{ nexus_components }}
          deb [trusted=yes] {{ nexus }}{{ apt_proxy }} noble-backports {{ nexus_components }}
          deb [signed-by=/usr/share/keyrings/nexus-apt.gpg] {{ nexus }}{{ apt_hosted }} jammy main

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Set date and time
      community.general.timezone:
        name: Asia/Tehran

    - name: Install prerequisites and ELK packages
      ansible.builtin.apt:
        pkg:
          - vim
          - zip
          - curl
          - wget
          - unzip
          - openjdk-17-jre
          - apt-transport-https
          - kibana={{ elk_version }}
          - elasticsearch={{ elk_version }}
          - logstash=1:{{ elk_version }}-1
        state: present
        update_cache: no

    - name: Configure elasticsearch.yml (append config)
      ansible.builtin.blockinfile:
        path: /etc/elasticsearch/elasticsearch.yml
        create: yes
        owner: root
        group: elasticsearch
        mode: "0660"
        block: |
          # ======================== Elasticsearch Configuration =========================
          # Override default settings for single node mode

          # Cluster name
          cluster.name: elk-single-node

          # Node name
          node.name: {{ hostname }}

          # Network
          network.host: {{ elasticsearch_network_host }}
          http.port: {{ elasticsearch_http_port }}

          # Single node discovery (this overrides cluster.initial_master_nodes)
          discovery.type: single-node

          # Disable bootstrap checks for single node
          discovery.seed_providers: file

          # Security settings
          xpack.security.http.ssl.enabled: false
          xpack.security.transport.ssl.enabled: false
        marker: "# {mark} ANSIBLE MANAGED BLOCK"

    - name: Remove conflicting settings from elasticsearch.yml
      ansible.builtin.replace:
        path: /etc/elasticsearch/elasticsearch.yml
        regexp: '^cluster\.initial_master_nodes:.*$'
        replace: '# cluster.initial_master_nodes: disabled for single-node'
      notify: restart elasticsearch

    - name: Configure kibana.yml (append config)
      ansible.builtin.blockinfile:
        path: /etc/kibana/kibana.yml
        create: yes
        owner: root
        group: kibana
        mode: "0660"
        block: |
          # ======================== Kibana Configuration =========================
          server.host: {{ kibana_server_host }}
          server.port: {{ kibana_server_port }}
          server.name: "elk-kibana"

          # Elasticsearch connection
          elasticsearch.hosts: ["http://localhost:{{ elasticsearch_http_port }}"]
          elasticsearch.username: "kibana_system"
          elasticsearch.password: "{{ kibana_system_password }}"

          # Security
          elasticsearch.ssl.verificationMode: none
          server.ssl.enabled: false
        marker: "# {mark} ANSIBLE MANAGED BLOCK"

    - name: Configure logstash.yml (append config)
      ansible.builtin.blockinfile:
        path: /etc/logstash/logstash.yml
        create: yes
        owner: root
        group: logstash
        mode: "0660"
        block: |
          # ======================== Logstash Configuration =========================
          node.name: {{ hostname }}
          path.data: /var/lib/logstash
          path.logs: /var/log/logstash

          # Elasticsearch connection
          xpack.monitoring.enabled: true
          xpack.monitoring.elasticsearch.hosts: ["http://localhost:{{ elasticsearch_http_port }}"]
          xpack.monitoring.elasticsearch.username: "logstash_system"
          xpack.monitoring.elasticsearch.password: "{{ logstash_system_password }}"

          # API settings
          api.enabled: true
          api.http.host: 0.0.0.0
          api.http.port: 9600
        marker: "# {mark} ANSIBLE MANAGED BLOCK"

    - name: Start and enable Elasticsearch service
      ansible.builtin.systemd:
        name: elasticsearch
        state: started
        enabled: yes

    - name: Wait for Elasticsearch to start (check port)
      ansible.builtin.wait_for:
        port: "{{ elasticsearch_http_port }}"
        host: "localhost"
        delay: 10
        timeout: 60
        state: started

    - name: Set bootstrap password for elastic user
      ansible.builtin.expect:
        command: /usr/share/elasticsearch/bin/elasticsearch-reset-password -u elastic -i
        responses:
          "Please confirm that you would like to continue": "y"
          "Enter password for \\[elastic\\]": "{{ elastic_password }}"
          "Re-enter password for \\[elastic\\]": "{{ elastic_password }}"
        creates: "/etc/elasticsearch/.bootstrapped"
      environment:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      register: password_result

    - name: Set password for kibana_system user
      ansible.builtin.expect:
        command: /usr/share/elasticsearch/bin/elasticsearch-reset-password -u kibana_system -i
        responses:
          "Please confirm that you would like to continue": "y"
          "Enter password for \\[kibana_system\\]": "{{ kibana_system_password }}"
          "Re-enter password for \\[kibana_system\\]": "{{ kibana_system_password }}"
        creates: "/etc/elasticsearch/.kibana_system_password_set"
      environment:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      register: kibana_password_result

    - name: Set password for logstash_system user
      ansible.builtin.expect:
        command: /usr/share/elasticsearch/bin/elasticsearch-reset-password -u logstash_system -i
        responses:
          "Please confirm that you would like to continue": "y"
          "Enter password for \\[logstash_system\\]": "{{ logstash_system_password }}"
          "Re-enter password for \\[logstash_system\\]": "{{ logstash_system_password }}"
        creates: "/etc/elasticsearch/.logstash_system_password_set"
      environment:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      register: logstash_password_result

    - name: Create flag file to prevent re-running password reset
      ansible.builtin.file:
        path: /etc/elasticsearch/.bootstrapped
        state: touch
        owner: root
        group: elasticsearch
        mode: "0660"

    - name: Restart Elasticsearch after password change
      ansible.builtin.systemd:
        name: elasticsearch
        state: restarted

    - name: Wait for Elasticsearch after restart
      ansible.builtin.wait_for:
        port: "{{ elasticsearch_http_port }}"
        host: "localhost"
        delay: 15
        timeout: 120

    - name: Verify Elasticsearch is accessible with new password
      ansible.builtin.uri:
        url: "http://localhost:{{ elasticsearch_http_port }}"
        method: GET
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: yes
        status_code: 200
        validate_certs: no
      register: es_auth_check
      until: es_auth_check.status == 200
      retries: 30
      delay: 5

    - name: Display Elasticsearch version info
      ansible.builtin.debug:
        msg: "Elasticsearch version: {{ es_auth_check.json.version.number }}"
      when: es_auth_check.json is defined

    - name: Start and enable Kibana service
      ansible.builtin.systemd:
        name: kibana
        state: started
        enabled: yes

    - name: Start and enable Logstash service
      ansible.builtin.systemd:
        name: logstash
        state: started
        enabled: yes

    - name: Wait for Kibana to be available
      ansible.builtin.uri:
        url: "http://{{ hostname }}:{{ kibana_server_port }}/api/status"
        status_code: 200
      register: result
      until: result.status == 200
      retries: 30
      delay: 5

    - name: Display success message
      ansible.builtin.debug:
        msg: |
          ===============================================
          ✅ ELK Stack 9.1.1 Installation Completed!
          ===============================================

          Elasticsearch: http://{{ ansible_default_ipv4.address }}:{{ elasticsearch_http_port }}
          Kibana:        http://{{ ansible_default_ipv4.address }}:{{ kibana_server_port }}

          Username: elastic
          Password: {{ elastic_password }}

          ⚠️  For production, please change the elastic password!
          ===============================================

  handlers:
    - name: restart elasticsearch
      ansible.builtin.systemd:
        name: elasticsearch
        state: restarted
      listen: "restart elasticsearch"

    - name: restart kibana
      ansible.builtin.systemd:
        name: kibana
        state: restarted
      listen: "restart kibana"

    - name: restart logstash
      ansible.builtin.systemd:
        name: logstash
        state: restarted
      listen: "restart logstash"
