#########################################################
#       ELK 9.1.1 installation playbook                 #
#       Maintainer: Majid Mortazavi                     #
#       Release note:                                   #
#           - V1 Just Install                           #
#           - V1.10 Refactor + CA/Cert generation       #
#           - V1.20 SSL Activated                       #
#       Douran Co. LTD                                  #
#########################################################

---
- name: Install ELK Stack 9.1.1 on Single Server with Generated Certificates
  hosts: ELKServers
  remote_user: root
  become: true

  vars:
    elk_version: "9.1.1"

    nexus: "<NEXUS URL>/repository"
    apt_proxy: "/apt-proxy-noble/"
    apt_hosted: "/apt-hosted/"
    nexus_components: "main restricted universe multiverse"

    elk_node_name: "<NODE NAME>"
    elk_server_ip: "<NODE IP>"

    elasticsearch_network_host: "0.0.0.0"
    elasticsearch_http_port: 9200
    elasticsearch_data_path: "/var/lib/elasticsearch"
    elasticsearch_logs_path: "/var/log/elasticsearch"
    elasticsearch_transport_port: 9300

    kibana_server_host: "0.0.0.0"
    kibana_server_port: 5601
    kibana_public_url: "https://{{ elk_server_ip }}:{{ kibana_server_port }}"
    server_ssl_keypassphrase: "{{ vault_kibana_key_pass }}"

    elastic_password: "{{ vault_elastic_password }}"
    kibana_system_password: "{{ vault_kibana_system_password }}"
    logstash_system_password: "{{ vault_logstash_system_password }}"

    cert_base_dir: "/etc/elastic-stack/certs"
    cert_ca_dir: "/etc/elastic-stack/certs/ca"
    cert_es_dir: "/etc/elasticsearch/certs"
    cert_kibana_dir: "/etc/kibana/certs"
    cert_logstash_dir: "/etc/logstash/certs"
    cert_tmp_dir: "/tmp/elk-certs"

    ca_p12_file: "{{ cert_ca_dir }}/elastic-stack-ca.p12"
    ca_crt_file: "{{ cert_ca_dir }}/elastic-stack-ca.crt"
    es_p12_file: "{{ cert_es_dir }}/elasticsearch.p12"
    es_p12_passphrase: "{{ vault_es_p12_pass }}"

  tasks:
    - name: Download Nexus APT public key from Nexus RAW repo
      ansible.builtin.get_url:
        url: "{{ nexus }}/raw-keys/root/gpg/apt/public.gpg.key"
        dest: "/usr/share/keyrings/nexus-apt.asc"
        mode: "0644"

    - name: Dearmor Nexus APT key
      ansible.builtin.command:
        cmd: "gpg --dearmor -o /usr/share/keyrings/nexus-apt.gpg /usr/share/keyrings/nexus-apt.asc"
      args:
        creates: "/usr/share/keyrings/nexus-apt.gpg"

    - name: Remove default Ubuntu source files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/ubuntu.sources
        - /etc/apt/sources.list.d/ubuntu.sources.curtin.orig

    - name: Create Nexus repository configuration for Ubuntu 24.04
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/nexus.list
        mode: "0644"
        content: |
          deb [trusted=yes] {{ nexus }}{{ apt_proxy }} noble {{ nexus_components }}
          deb [trusted=yes] {{ nexus }}{{ apt_proxy }} noble-updates {{ nexus_components }}
          deb [trusted=yes] {{ nexus }}{{ apt_proxy }} noble-security {{ nexus_components }}
          deb [trusted=yes] {{ nexus }}{{ apt_proxy }} noble-backports {{ nexus_components }}
          deb [signed-by=/usr/share/keyrings/nexus-apt.gpg] {{ nexus }}{{ apt_hosted }} jammy main

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install base packages
      ansible.builtin.apt:
        pkg:
          - gnupg
          - curl
          - wget
          - unzip
          - zip
          - vim
          - openssl
          - python3-pexpect
          - apt-transport-https
        state: present
        update_cache: true

    - name: Set timezone
      community.general.timezone:
        name: Asia/Tehran

    - name: Install ELK packages
      ansible.builtin.apt:
        pkg:
          - "elasticsearch={{ elk_version }}"
          - "kibana={{ elk_version }}"
          - "logstash=1:{{ elk_version }}-1"
        state: present
        update_cache: false

    - name: Create certificate directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ cert_base_dir }}", owner: "root", group: "root", mode: "0750" }
        - { path: "{{ cert_ca_dir }}", owner: "root", group: "root", mode: "0750" }
        - { path: "{{ cert_es_dir }}", owner: "root", group: "elasticsearch", mode: "0750" }
        - { path: "{{ cert_kibana_dir }}", owner: "root", group: "kibana", mode: "0750" }
        - { path: "{{ cert_logstash_dir }}", owner: "root", group: "logstash", mode: "0750" }
        - { path: "{{ cert_tmp_dir }}", owner: "root", group: "root", mode: "0750" }

    - name: Generate Elastic Stack CA
      ansible.builtin.command:
        cmd: >
          /usr/share/elasticsearch/bin/elasticsearch-certutil ca
          --silent
          --pass ""
          --out {{ ca_p12_file }}
      args:
        creates: "{{ ca_p12_file }}"

    - name: Export CA certificate to PEM
      ansible.builtin.command:
        cmd: >
          openssl pkcs12
          -in {{ ca_p12_file }}
          -clcerts
          -nokeys
          -out {{ ca_crt_file }}
          -passin pass:
      args:
        creates: "{{ ca_crt_file }}"

    - name: Generate Elasticsearch PKCS12 certificate
      ansible.builtin.command:
        cmd: >
          /usr/share/elasticsearch/bin/elasticsearch-certutil cert
          --silent
          --pass "{{ es_p12_passphrase }}"
          --ca {{ ca_p12_file }}
          --ca-pass ""
          --name {{ elk_node_name }}
          --dns localhost
          --dns {{ elk_node_name }}
          --ip 127.0.0.1
          --ip {{ elk_server_ip }}
          --out {{ es_p12_file }}
      args:
        creates: "{{ es_p12_file }}"

    - name: Create instances file for PEM certificates
      ansible.builtin.copy:
        dest: "{{ cert_tmp_dir }}/instances.yml"
        mode: "0600"
        content: |
          instances:
            - name: kibana
              dns:
                - localhost
                - {{ elk_node_name }}
              ip:
                - 127.0.0.1
                - {{ elk_server_ip }}
            - name: logstash
              dns:
                - localhost
                - {{ elk_node_name }}
              ip:
                - 127.0.0.1
                - {{ elk_server_ip }}

    - name: Generate PEM certificates for Kibana and Logstash
      ansible.builtin.command:
        cmd: >
          /usr/share/elasticsearch/bin/elasticsearch-certutil cert
          --silent
          --pem
          --pass "{{ server_ssl_keypassphrase }}"
          --ca {{ ca_p12_file }}
          --ca-pass ""
          --in {{ cert_tmp_dir }}/instances.yml
          --out {{ cert_tmp_dir }}/elastic-stack-pem-certs.zip
      args:
        creates: "{{ cert_tmp_dir }}/elastic-stack-pem-certs.zip"

    - name: Extract PEM certificates
      ansible.builtin.unarchive:
        src: "{{ cert_tmp_dir }}/elastic-stack-pem-certs.zip"
        dest: "{{ cert_tmp_dir }}"
        remote_src: true
        creates: "{{ cert_tmp_dir }}/kibana/kibana.crt"

    - name: Copy Kibana certificates
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ cert_kibana_dir }}/{{ item.dest }}"
        remote_src: true
        owner: root
        group: kibana
        mode: "{{ item.mode }}"
      loop:
        - { src: "{{ cert_tmp_dir }}/kibana/kibana.crt", dest: "kibana.crt", mode: "0640" }
        - { src: "{{ cert_tmp_dir }}/kibana/kibana.key", dest: "kibana.key", mode: "0640" }
        - { src: "{{ ca_crt_file }}", dest: "ca.crt", mode: "0644" }

    - name: Copy Logstash certificates
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ cert_logstash_dir }}/{{ item.dest }}"
        remote_src: true
        owner: root
        group: logstash
        mode: "{{ item.mode }}"
      loop:
        - { src: "{{ cert_tmp_dir }}/logstash/logstash.crt", dest: "logstash.crt", mode: "0640" }
        - { src: "{{ cert_tmp_dir }}/logstash/logstash.key", dest: "logstash.key", mode: "0640" }
        - { src: "{{ ca_crt_file }}", dest: "ca.crt", mode: "0644" }

    - name: Set Elasticsearch certificate permissions
      ansible.builtin.file:
        path: "{{ es_p12_file }}"
        owner: root
        group: elasticsearch
        mode: "0640"

    - name: Configure elasticsearch.yml
      ansible.builtin.copy:
        dest: /etc/elasticsearch/elasticsearch.yml
        owner: root
        group: elasticsearch
        mode: "0660"
        content: |
          cluster.name: elk-single-node
          node.name: {{ elk_node_name }}

          path.data: {{ elasticsearch_data_path }}
          path.logs: {{ elasticsearch_logs_path }}

          network.host: {{ elasticsearch_network_host }}
          http.port: {{ elasticsearch_http_port }}
          transport.port: {{ elasticsearch_transport_port }}

          discovery.type: single-node

          xpack.security.enabled: true

          xpack.security.http.ssl.enabled: true
          xpack.security.http.ssl.keystore.path: certs/elasticsearch.p12
          xpack.security.http.ssl.truststore.path: certs/elasticsearch.p12

          xpack.security.transport.ssl.enabled: true
          xpack.security.transport.ssl.verification_mode: certificate
          xpack.security.transport.ssl.keystore.path: certs/elasticsearch.p12
          xpack.security.transport.ssl.truststore.path: certs/elasticsearch.p12
      notify: restart elasticsearch

    - name: Configure kibana.yml
      ansible.builtin.copy:
        dest: /etc/kibana/kibana.yml
        owner: root
        group: kibana
        mode: "0660"
        content: |
          server.host: {{ kibana_server_host }}
          server.port: {{ kibana_server_port }}
          server.name: elk-kibana
          server.publicBaseUrl: "{{ kibana_public_url }}"

          server.ssl.enabled: true
          server.ssl.certificate: {{ cert_kibana_dir }}/kibana.crt
          server.ssl.key: {{ cert_kibana_dir }}/kibana.key
          server.ssl.keyPassphrase: "{{ server_ssl_keypassphrase }}"

          elasticsearch.hosts: ["https://localhost:{{ elasticsearch_http_port }}"]
          elasticsearch.username: "kibana_system"
          elasticsearch.password: "{{ kibana_system_password }}"
          elasticsearch.ssl.certificateAuthorities: ["{{ cert_kibana_dir }}/ca.crt"]
          elasticsearch.ssl.verificationMode: certificate
      notify: restart kibana

    - name: Configure logstash.yml
      ansible.builtin.copy:
        dest: /etc/logstash/logstash.yml
        owner: root
        group: logstash
        mode: "0660"
        content: |
          node.name: {{ elk_node_name }}
          path.data: /var/lib/logstash
          path.logs: /var/log/logstash

          xpack.monitoring.enabled: true
          xpack.monitoring.elasticsearch.hosts: ["https://localhost:{{ elasticsearch_http_port }}"]
          xpack.monitoring.elasticsearch.username: "logstash_system"
          xpack.monitoring.elasticsearch.password: "{{ logstash_system_password }}"
          xpack.monitoring.elasticsearch.ssl.certificate_authority: "{{ cert_logstash_dir }}/ca.crt"
          xpack.monitoring.elasticsearch.ssl.verification_mode: certificate

          api.enabled: true
          api.http.host: 0.0.0.0
          api.http.port: 9600
      notify: restart logstash

    - name: Ensure Elasticsearch keystore exists
      ansible.builtin.command:
        cmd: /usr/share/elasticsearch/bin/elasticsearch-keystore create
      args:
        creates: /etc/elasticsearch/elasticsearch.keystore

    - name: Add HTTP SSL keystore password to Elasticsearch keystore
      ansible.builtin.shell: |
        echo "{{ es_p12_passphrase }}" | /usr/share/elasticsearch/bin/elasticsearch-keystore add -x -f xpack.security.http.ssl.keystore.secure_password
      args:
        creates: /etc/elasticsearch/.http_ssl_keystore_password_set

    - name: Create HTTP SSL keystore password flag
      ansible.builtin.file:
        path: /etc/elasticsearch/.http_ssl_keystore_password_set
        state: touch
        owner: root
        group: elasticsearch
        mode: "0660"

    - name: Add HTTP SSL truststore password to Elasticsearch keystore
      ansible.builtin.shell: |
        echo "{{ es_p12_passphrase }}" | /usr/share/elasticsearch/bin/elasticsearch-keystore add -x -f xpack.security.http.ssl.truststore.secure_password
      args:
        creates: /etc/elasticsearch/.http_ssl_truststore_password_set

    - name: Create HTTP SSL truststore password flag
      ansible.builtin.file:
        path: /etc/elasticsearch/.http_ssl_truststore_password_set
        state: touch
        owner: root
        group: elasticsearch
        mode: "0660"

    - name: Add transport SSL keystore password to Elasticsearch keystore
      ansible.builtin.shell: |
        echo "{{ es_p12_passphrase }}" | /usr/share/elasticsearch/bin/elasticsearch-keystore add -x -f xpack.security.transport.ssl.keystore.secure_password
      args:
        creates: /etc/elasticsearch/.transport_ssl_keystore_password_set

    - name: Create transport SSL keystore password flag
      ansible.builtin.file:
        path: /etc/elasticsearch/.transport_ssl_keystore_password_set
        state: touch
        owner: root
        group: elasticsearch
        mode: "0660"

    - name: Add transport SSL truststore password to Elasticsearch keystore
      ansible.builtin.shell: |
        echo "{{ es_p12_passphrase }}" | /usr/share/elasticsearch/bin/elasticsearch-keystore add -x -f xpack.security.transport.ssl.truststore.secure_password
      args:
        creates: /etc/elasticsearch/.transport_ssl_truststore_password_set

    - name: Create transport SSL truststore password flag
      ansible.builtin.file:
        path: /etc/elasticsearch/.transport_ssl_truststore_password_set
        state: touch
        owner: root
        group: elasticsearch
        mode: "0660"

    - name: Start and enable Elasticsearch
      ansible.builtin.systemd:
        name: elasticsearch
        state: started
        enabled: true

    - name: Wait for Elasticsearch port
      ansible.builtin.wait_for:
        host: localhost
        port: "{{ elasticsearch_http_port }}"
        delay: 10
        timeout: 120
        state: started

    - name: Set password for elastic user
      ansible.builtin.expect:
        command: /usr/share/elasticsearch/bin/elasticsearch-reset-password -u elastic -i
        responses:
          "Please confirm that you would like to continue": "y"
          "Enter password for \\[elastic\\]": "{{ elastic_password }}"
          "Re-enter password for \\[elastic\\]": "{{ elastic_password }}"
        creates: "/etc/elasticsearch/.elastic_password_set"
      register: elastic_password_result

    - name: Create elastic password flag
      ansible.builtin.file:
        path: /etc/elasticsearch/.elastic_password_set
        state: touch
        owner: root
        group: elasticsearch
        mode: "0660"
      when: elastic_password_result is changed

    - name: Set password for kibana_system user
      ansible.builtin.expect:
        command: /usr/share/elasticsearch/bin/elasticsearch-reset-password -u kibana_system -i
        responses:
          "Please confirm that you would like to continue": "y"
          "Enter password for \\[kibana_system\\]": "{{ kibana_system_password }}"
          "Re-enter password for \\[kibana_system\\]": "{{ kibana_system_password }}"
        creates: "/etc/elasticsearch/.kibana_system_password_set"
      register: kibana_password_result

    - name: Create kibana_system password flag
      ansible.builtin.file:
        path: /etc/elasticsearch/.kibana_system_password_set
        state: touch
        owner: root
        group: elasticsearch
        mode: "0660"
      when: kibana_password_result is changed

    - name: Set password for logstash_system user
      ansible.builtin.expect:
        command: /usr/share/elasticsearch/bin/elasticsearch-reset-password -u logstash_system -i
        responses:
          "Please confirm that you would like to continue": "y"
          "Enter password for \\[logstash_system\\]": "{{ logstash_system_password }}"
          "Re-enter password for \\[logstash_system\\]": "{{ logstash_system_password }}"
        creates: "/etc/elasticsearch/.logstash_system_password_set"
      register: logstash_password_result

    - name: Create logstash_system password flag
      ansible.builtin.file:
        path: /etc/elasticsearch/.logstash_system_password_set
        state: touch
        owner: root
        group: elasticsearch
        mode: "0660"
      when: logstash_password_result is changed

    - name: Restart Elasticsearch after password initialization
      ansible.builtin.systemd:
        name: elasticsearch
        state: restarted

    - name: Wait for Elasticsearch after restart
      ansible.builtin.wait_for:
        host: localhost
        port: "{{ elasticsearch_http_port }}"
        delay: 15
        timeout: 120
        state: started

    - name: Verify Elasticsearch authentication
      ansible.builtin.uri:
        url: "https://localhost:{{ elasticsearch_http_port }}"
        method: GET
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        status_code: 200
        ca_path: "{{ ca_crt_file }}"
      register: es_auth_check
      until: es_auth_check.status == 200
      retries: 30
      delay: 5

    - name: Start and enable Kibana
      ansible.builtin.systemd:
        name: kibana
        state: started
        enabled: true

    - name: Start and enable Logstash
      ansible.builtin.systemd:
        name: logstash
        state: started
        enabled: true

    - name: Wait for Kibana
      ansible.builtin.uri:
        url: "https://{{ elk_server_ip }}:{{ kibana_server_port }}/api/status"
        method: GET
        status_code: 200
        ca_path: "{{ ca_crt_file }}"
      register: kibana_status
      until: kibana_status.status == 200
      retries: 30
      delay: 5

    - name: Display installation summary
      ansible.builtin.debug:
        msg: |
          ELK Stack {{ elk_version }} installation completed.

          Elasticsearch:
            URL: https://{{ elk_server_ip }}:{{ elasticsearch_http_port }}
            User: elastic

          Kibana:
            URL: https://{{ elk_server_ip }}:{{ kibana_server_port }}

          Generated certificate files:
            CA: {{ ca_crt_file }}
            Elasticsearch PKCS12: {{ es_p12_file }}
            Kibana cert dir: {{ cert_kibana_dir }}
            Logstash cert dir: {{ cert_logstash_dir }}

          SSL is generated but not enabled yet.

  handlers:
    - name: restart elasticsearch
      ansible.builtin.systemd:
        name: elasticsearch
        state: restarted

    - name: restart kibana
      ansible.builtin.systemd:
        name: kibana
        state: restarted

    - name: restart logstash
      ansible.builtin.systemd:
        name: logstash
        state: restarted
